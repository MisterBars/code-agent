<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Agent</title>

  <!-- Highlight.js — подсветка кода -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Marked — markdown рендер -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Code Agent</h1>
        <button id="new-chat-btn" class="primary-btn">+ New chat</button>
      </div>
      <div class="sidebar-section-title">Беседы</div>
      <div id="conversation-list" class="conversation-list"></div>
    </aside>

    <!-- Оверлей для закрытия сайдбара на мобильном -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Открыть список бесед">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="2" y1="4" x2="16" y2="4"/>
              <line x1="2" y1="9" x2="16" y2="9"/>
              <line x1="2" y1="14" x2="16" y2="14"/>
            </svg>
          </button>

          <div class="topbar-info">
            <div class="topbar-title">Локальный AI-агент</div>
            <div class="topbar-subtitle" id="conversation-label">Выбери или создай беседу</div>
          </div>
        </div>

        <div class="model-dropdown-wrapper" id="modelWrapper">
          <button class="model-trigger" id="modelTrigger" aria-haspopup="listbox" aria-expanded="false" type="button">
            <span class="model-dot"></span>
            <span class="model-name" id="triggerName">Загрузка...</span>
            <span class="model-gpu-tag" id="triggerGpu">GPU</span>
            <svg class="model-chevron" width="14" height="14" viewBox="0 0 16 16" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4,6 8,10 12,6"/>
            </svg>
          </button>

          <div class="model-dropdown" id="modelDropdown" role="listbox">
            <div class="model-search-wrap">
              <svg class="model-search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="6.5" cy="6.5" r="4.5"/>
                <line x1="10.5" y1="10.5" x2="14" y2="14"/>
              </svg>
              <input class="model-search-input" id="modelSearch" type="text"
                     placeholder="Поиск модели..." autocomplete="off" spellcheck="false">
            </div>

            <div class="model-scroll">
              <ul class="model-list" id="modelList"></ul>
              <div class="model-empty" id="modelEmpty">Модели не найдены</div>
            </div>

            <div class="model-footer">
              <span class="model-footer-hint" id="modelFooterHint">—</span>
              <button class="model-refresh-btn" id="modelRefreshBtn" type="button">
                <svg id="modelRefreshIcon" width="11" height="11" viewBox="0 0 16 16" fill="none"
                     stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="1,4 1,10 7,10"/>
                  <path d="M1 10 A7 7 0 1 1 4 3.5"/>
                </svg>
                Обновить
              </button>
            </div>
          </div>
        </div>
      </header>

      <section id="messages" class="messages"></section>

      <footer class="composer">
        <div class="composer-inner">
          <textarea
            id="message-input"
            placeholder="Напиши задачу для агента... (Ctrl+Enter — отправить)"
          ></textarea>
          <button id="send-btn" class="primary-btn send-btn">↑</button>
        </div>
        <div class="composer-hint">Ctrl+Enter — отправить</div>
      </footer>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
