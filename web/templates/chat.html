<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Agent</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Code Agent</h1>
      <button id="new-chat-btn" class="primary-btn">+ New chat</button>
    </div>
    <div class="sidebar-section-title">Беседы</div>
    <div id="conversation-list" class="conversation-list"></div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main">
    <header class="topbar">
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Меню">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="4"  x2="16" y2="4"/>
          <line x1="2" y1="9"  x2="16" y2="9"/>
          <line x1="2" y1="14" x2="16" y2="14"/>
        </svg>
      </button>
      <div class="topbar-info">
        <div class="topbar-title">Локальный AI-агент</div>
        <div class="topbar-subtitle" id="conversation-label">Выбери или создай беседу</div>
      </div>
    </header>

    <section id="messages" class="messages"></section>

    <footer class="composer">
      <!-- Строка с textarea и кнопкой отправки -->
      <div class="composer-inner">
        <textarea id="message-input" placeholder="Напиши задачу для агента..."></textarea>
        <button id="send-btn" class="primary-btn send-btn">↑</button>
      </div>

      <!-- Нижняя строка: выбор модели слева, подсказка справа -->
      <div class="composer-bar">

        <!-- Model Selector -->
        <div class="ms-wrapper" id="msWrapper">
          <button class="ms-trigger" id="msTrigger" type="button">
            <span class="ms-dot"></span>
            <span class="ms-name" id="msName">Загрузка...</span>
            <span class="ms-badge" id="msBadge">GPU</span>
            <svg class="ms-chevron" width="11" height="11" viewBox="0 0 12 12" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="2,4 6,8 10,4"/>
            </svg>
          </button>

          <!-- Панель — открывается ВВЕРХ -->
          <div class="ms-panel" id="msPanel" role="listbox">
            <div class="ms-search-row">
              <svg class="ms-search-icon" width="13" height="13" viewBox="0 0 16 16"
                   fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="6.5" cy="6.5" r="4.5"/>
                <line x1="10.5" y1="10.5" x2="14" y2="14"/>
              </svg>
              <input class="ms-search" id="msSearch" type="text"
                     placeholder="Поиск модели..." autocomplete="off" spellcheck="false"/>
            </div>
            <div class="ms-list-wrap">
              <ul class="ms-list" id="msList"></ul>
              <div class="ms-empty" id="msEmpty">Модели не найдены</div>
            </div>
            <div class="ms-footer">
              <span class="ms-hint" id="msHint">—</span>
              <button class="ms-refresh" id="msRefresh" type="button">
                <svg id="msRefreshIcon" width="11" height="11" viewBox="0 0 16 16" fill="none"
                     stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                  <polyline points="1,4 1,10 7,10"/>
                  <path d="M1 10 A7 7 0 1 1 4 3.5"/>
                </svg>
                Обновить
              </button>
            </div>
          </div>
        </div>
        <!-- /Model Selector -->

        <span class="composer-hint">Ctrl+Enter — отправить</span>
      </div>
    </footer>
  </main>

</div>
<script src="/static/app.js"></script>
</body>
</html>
